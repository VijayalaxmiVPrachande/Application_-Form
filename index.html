<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="page-wrapper">
        <div class="card">
            <div class="card-header">
                <div class="icon-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <h1>Application Form</h1>
                <p>Please fill in your details below</p>
            </div>

            <form id="appForm" novalidate>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name <span class="req">*</span></label>
                        <div class="input-wrap">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="firstName" name="firstName" placeholder="John" required />
                        </div>
                        <span class="error-msg" id="firstNameError">Please enter your first name.</span>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name <span class="req">*</span></label>
                        <div class="input-wrap">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
                        </div>
                        <span class="error-msg" id="lastNameError">Please enter your last name.</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="req">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                        <input type="email" id="email" name="email" placeholder="john.doe@example.com" required />
                    </div>
                    <span class="error-msg" id="emailError">Please enter a valid email address.</span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number <span class="req">*</span></label>
                    <div class="input-wrap">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path
                                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12 19.79 19.79 0 0 1 1.05 3.4 2 2 0 0 1 3 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 16z" />
                        </svg>
                        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required />
                    </div>
                    <span class="error-msg" id="phoneError">Please enter a valid phone number.</span>
                </div>

                <div class="form-group">
                    <label for="address">Address <span class="req">*</span></label>
                    <div class="input-wrap textarea-wrap">
                        <svg class="input-icon textarea-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                        <textarea id="address" name="address" rows="4" placeholder="123 Main Street, City, State, ZIP"
                            required></textarea>
                    </div>
                    <span class="error-msg" id="addressError">Please enter your address.</span>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Submit Application</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </button>

            </form>
        </div>

        <div class="success-toast" id="successToast">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <path d="m9 11 3 3L22 4" />
            </svg>
            <span>Application submitted successfully!</span>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8081/api/applicants';

        const form = document.getElementById('appForm');
        const toast = document.getElementById('successToast');

        const fields = [
            { id: 'firstName', errId: 'firstNameError', validate: v => v.trim().length >= 2 },
            { id: 'lastName', errId: 'lastNameError', validate: v => v.trim().length >= 2 },
            { id: 'email', errId: 'emailError', validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) },
            { id: 'phone', errId: 'phoneError', validate: v => /^[\d\s\+\-\(\)]{7,15}$/.test(v.trim()) },
            { id: 'address', errId: 'addressError', validate: v => v.trim().length >= 5 },
        ];

        fields.forEach(({ id, errId, validate }) => {
            const input = document.getElementById(id);
            input.addEventListener('blur', () => checkField(id, errId, validate));
            input.addEventListener('input', () => {
                if (input.classList.contains('invalid')) checkField(id, errId, validate);
            });
        });

        function checkField(id, errId, validate) {
            const input = document.getElementById(id);
            const err = document.getElementById(errId);
            const valid = validate(input.value);
            input.classList.toggle('invalid', !valid);
            input.classList.toggle('valid', valid);
            err.classList.toggle('visible', !valid);
            return valid;
        }

        function showToast(msg, success) {
            toast.querySelector('span').textContent = msg;
            toast.style.background = success
                ? 'linear-gradient(135deg,#065f46,#047857)'
                : 'linear-gradient(135deg,#7f1d1d,#b91c1c)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        form.addEventListener('submit', async e => {
            e.preventDefault();
            const allValid = fields.every(({ id, errId, validate }) => checkField(id, errId, validate));
            if (!allValid) return;

            const btn = form.querySelector('.btn-submit');
            btn.disabled = true;
            btn.querySelector('span').textContent = 'Submitting…';

            const payload = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address: document.getElementById('address').value.trim(),
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (res.ok) {
                    showToast('✔ Application submitted successfully!', true);
                    form.reset();
                    fields.forEach(({ id }) =>
                        document.getElementById(id).classList.remove('valid', 'invalid'));
                } else {
                    const data = await res.json().catch(() => ({}));
                    showToast(data.error || 'Submission failed. Please try again.', false);
                }
            } catch (err) {
                showToast('⚠ Cannot reach server. Is the backend running?', false);
            } finally {
                btn.disabled = false;
                btn.querySelector('span').textContent = 'Submit Application';
            }
        });
    </script>
</body>

</html>
